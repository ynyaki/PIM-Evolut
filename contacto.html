    <main>
      <h1>Formulario de Contacto</h1>
      <form action="morning-paper-a0fc.contry-1990.workers.dev" method="get">
        <label for="nomcomp">Nombre completo <em>*</em></label
        ><br />
        <input type="text" id="nomcomp" name="nomcomp" minlength="2" /><br />
        <label for="email">Email <em>*</em></label
        ><br />
        <input
          type="email"
          id="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required
        /><br />
        <label for="telf">Teléfono</label><br />
        <input type="tel" id="telf" name="telf" /><br />
        <label for="serv">Servicio de interés *</label><br />
        <select name="serv" id="serv" required>
          <option value="consulta">Consulta</option>
          <option value="soporte">Soporte</option>
          <option value="desarrollo">Desarrollo</option>
          <option value="completo">Completo</option>
        </select>
        <br />
        <label for="msg">Mensaje *</label><br />
        <textarea
          name="msg"
          id="msg"
          rows="5"
          minlength="30"
          required
          placeholder="Describa su empresa y el servicio que desea."
        ></textarea
        ><br />
        <input type="submit" value="Enviar" />
      </form>
    </main>
